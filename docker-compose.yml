version: '3.8'

services:
  qdrant-db:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: unless-stopped


  redis-cache:
    image: redis:alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

