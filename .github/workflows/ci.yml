name: RAG Bot CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-rag-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create Swap Space
        run: |
          sudo swapoff -a || true
          sudo rm -f /swapfile
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          
          
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd bot
          pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "Ai_Api_Key=${{ secrets.AI_API_KEY }}" > bot/.env

      - name: Start Infrastructure
        run: |
          # Start only web and db to save RAM
          docker compose up -d rag-web qdrant-db
          sleep 20

      - name: Debug Container Startup
        if: failure()
        run: docker compose logs rag-web

      - name: Run Data Ingestion
        env:
          CI_FAST_MODE: "true"  
          Ai_Api_Key: ${{ secrets.AI_API_KEY }}
        run: |
          docker compose exec rag-web python ingest.py

      - name: Run Automated AI Tests
        env:
          GROQ_API_KEY: ${{ secrets.AI_API_KEY }}
          Ai_Api_Key: ${{ secrets.AI_API_KEY }}
        run: |
          cd bot
          pip install pytest
          pytest test_rag.py -v

      - name: Shutdown Infrastructure
        if: always()
        run: docker compose down
